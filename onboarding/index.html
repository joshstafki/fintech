<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to FINTECH</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --grad-violet: #7c3aed;
    --grad-blue: #3b82f6;
    --grad-teal: #2dd4bf;
    --ink: #0f172a;
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.72);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--grad-violet) 0%, var(--grad-blue) 50%, var(--grad-teal) 100%);
    background-size: 200% 200%;
    animation: gradientDrift 12s ease infinite;
}

body::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
}

@keyframes gradientDrift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.card {
    position: relative;
    z-index: 1;
    width: min(480px, 100%);
    padding: 2.75rem 2.25rem;
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
}

.logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 1.25rem;
}

.logo-tile {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #93c5fd, #5eead4);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800; font-size: 1.4rem;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
}

.logo-word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800; font-size: 1.5rem;
    letter-spacing: 0.04em;
}

.subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
}

.tag {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
}

.step-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    min-height: 1.7rem;
}

.step-text {
    color: var(--muted);
    line-height: 1.7;
    min-height: 90px;
    font-size: 0.95rem;
}

.progress {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 1.75rem 0;
}

.dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    transition: background 0.2s ease;
}

.dot.active { background: var(--grad-teal); }

.actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
}

button {
    border: none;
    cursor: pointer;
    padding: 0.7rem 1.3rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

.ghost {
    background: transparent;
    color: var(--muted);
}

.ghost:hover { color: var(--text); }

.ghost:disabled {
    opacity: 0.35;
    cursor: default;
}

.secondary {
    background: rgba(255, 255, 255, 0.08);
    color: white;
}

.secondary:hover { background: rgba(255, 255, 255, 0.15); }

.primary {
    background: linear-gradient(135deg, #93c5fd, #5eead4);
    color: var(--ink);
}

.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25); }

.left-actions { display: flex; gap: 0.5rem; }
</style>
</head>
<body>

<div class="card">

    <div class="logo-row">
        <div class="logo-tile">F</div>
        <div class="logo-word">INTECH</div>
    </div>

    <p class="subtitle">Let's get you comfortable with your dashboard.</p>

    <div class="tag"><span>Getting Started</span></div>

    <div id="content" aria-live="polite">
        <!-- populated by render() -->
    </div>

    <div class="progress" id="progress"></div>

    <div class="actions">
        <div class="left-actions">
            <button class="ghost" id="back-btn" onclick="prevStep()">Back</button>
            <button class="ghost" onclick="skipTour()">Skip</button>
        </div>
        <button class="primary" id="next-btn" onclick="nextStep()">Next</button>
    </div>

</div>

<script>
// Change this once — everything else references it.
const DASHBOARD_URL = "https://joshstafki.github.io/fintech/tech/";

const steps = [
    {
        title: "Five Categories, Built From Real Use",
        text: "Out-of-Pocket, Bank-Initiated, Fill-Ups, Bank Reconciliation, and Grocery Budget — the way you actually track spending, not a generic template."
    },
    {
        title: "No Bank Linking. Ever.",
        text: "Everything here is entered by hand, on purpose. No credentials shared with a third party, no automatic pulls from your bank — you decide what goes in."
    },
    {
        title: "Real-Time, Everywhere",
        text: "Edit on your laptop, see it update instantly on your phone. Built on live sync, not a save button."
    },
    {
        title: "Private By Default",
        text: "Sign in with Google and that's it. Your ledger lives in its own private space — nobody else's data, and nobody else, can reach it."
    },
    {
        title: "You're Ready",
        text: "That's the whole tour. Let's open your dashboard."
    }
];

let currentStep = 0;

function render() {
    document.getElementById("content").innerHTML = `
        <h2 class="step-title">${steps[currentStep].title}</h2>
        <p class="step-text">${steps[currentStep].text}</p>
    `;

    const progress = document.getElementById("progress");
    progress.innerHTML = "";
    steps.forEach((_, index) => {
        const dot = document.createElement("div");
        dot.className = index <= currentStep ? "dot active" : "dot";
        progress.appendChild(dot);
    });

    document.getElementById("back-btn").disabled = currentStep === 0;
    document.getElementById("next-btn").textContent =
        currentStep === steps.length - 1 ? "Open Dashboard" : "Next";
}

function goToDashboard() {
    localStorage.setItem("fintechOnboardingComplete", "true");
    window.location.href = DASHBOARD_URL;
}

function nextStep() {
    if (currentStep < steps.length - 1) {
        currentStep++;
        render();
    } else {
        goToDashboard();
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        render();
    }
}

function skipTour() {
    goToDashboard();
}

// Don't replay the tour for someone who's already seen it.
if (localStorage.getItem("fintechOnboardingComplete") === "true") {
    window.location.href = DASHBOARD_URL;
} else {
    render();
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") nextStep();
    if (e.key === "ArrowLeft") prevStep();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="https://joshstafki.github.io/fintech/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6b7280;
            --primary-blue: #3b82f6;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --border-color: #e5e7eb;
            --header-blue: #eff6ff;
            --header-red: #fef2f2;
            --header-green: #ecfdf5;
            --header-purple: #faf5ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; }
        .dashboard-header { margin-bottom: 2rem; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; align-items: start; }
        .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 1.5rem; }
        .card-header { padding: 1rem 1.25rem; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); }
        .header-blue { background-color: var(--header-blue); color: #1d4ed8; }
        .header-red { background-color: var(--header-red); color: #b91c1c; }
        .header-green { background-color: var(--header-green); color: #047857; }
        .header-purple { background-color: var(--header-purple); color: #6d28d9; }
        .card-body { padding: 0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-color); }
        th { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); background-color: #f9fafb; font-weight: 500; }
        tr:last-child td { border-bottom: none; }

        .badge { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .badge-paid { background-color: #d1fae5; color: #065f46; }
        .badge-unpaid { background-color: #fee2e2; color: #991b1b; }

        .total-row { background-color: #f9fafb; font-weight: 700; font-size: 1.1rem; }
        .amount-cell { font-family: "Courier New", Courier, monospace; font-weight: 600; }
        .amount-red { color: var(--danger-red); }
        .amount-green { color: var(--success-green); }

        .add-row-btn { cursor: pointer; color: var(--primary-blue); font-weight: 600; text-align: center; background-color: #ffffff; transition: background-color 0.2s; }
        .add-row-btn:hover { background-color: #eff6ff; }
        .inline-input { width: 100%; padding: 0.4rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
        .save-btn { background: var(--success-green); color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .save-btn:hover { background: #059669; }

        .action-cell { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #d1d5db; font-size: 1.2rem; cursor: pointer; padding-left: 0.75rem; transition: color 0.2s; font-weight: bold; line-height: 1; }
        .delete-btn:hover { color: var(--danger-red); }

        .summary-card { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .summary-title { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
        .summary-value { font-size: 2rem; font-weight: 700; }
        .ghost-input { border: none; background: transparent; font-size: 2rem; font-weight: 700; color: var(--text-main); width: 100%; outline: none; font-family: inherit; border-bottom: 2px dashed transparent; transition: border-bottom 0.2s; padding: 0; }
        .ghost-input:focus { border-bottom: 2px dashed var(--border-color); }

        @media (max-width: 768px) { body { padding: 1rem; } .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Financial Dashboard</h1>
        <p style="color: var(--text-muted); margin-top: 0.25rem;">Live Data Connected (Firebase)</p>
        <button onclick="performHardReset()" style="background: var(--danger-red); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 1rem;">
            Hard Reset (Wipe All Data)
        </button>
    </div>

    <div class="dashboard-grid">
        <div>
            <div class="card">
                <div class="card-header header-blue">Out of Pocket Expenses</div>
                <div class="card-body">
                    <table>
                        <thead><tr><th>Amount</th><th>Name</th><th>Status</th></tr></thead>
                        <tbody id="out-of-pocket-body"></tbody>
                        <tr class="total-row"><td colspan="3">Total: <span id="out-of-pocket-total">$0.00</span></td></tr>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header header-red">Bank Initiated Expenses</div>
                <div class="card-body">
                    <table>
                        <thead><tr><th>Amount</th><th>Name</th><th>Status</th></tr></thead>
                        <tbody id="bank-initiated-body"></tbody>
                        <tr class="total-row"><td colspan="3">Total: <span id="bank-initiated-total">$0.00</span></td></tr>
                    </table>
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column;">
            <div class="card">
                <div class="summary-card">
                    <span class="summary-title">Total Spendable Income</span>
                    <div style="display: flex; align-items: baseline; font-size: 2rem; font-weight: 700;">
                        <span style="color: var(--text-muted); margin-right: 4px;">$</span>
                        <input type="number" id="spendable-income" class="ghost-input" value="0" step="0.01" oninput="calculateRevenue()" onchange="persistSpendableIncome()">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="summary-card">
                    <span class="summary-title">Actual Total Revenue</span>
                    <span class="summary-value" id="actual-revenue">$0.00</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header header-blue">Revenue vs. Expenses</div>
                <div class="card-body" style="padding: 1.5rem;">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column;">
            <div class="card">
                <div class="card-header header-green">Fill Ups</div>
                <div class="card-body">
                    <table>
                        <thead><tr><th>Name</th><th>Status</th></tr></thead>
                        <tbody id="fill-ups-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <div class="card-header header-blue">Bank Reconciliation</div>
                <div class="card-body">
                    <table>
                        <tbody id="bank-recon-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <div class="card-header header-purple">Grocery Budget</div>
                <div class="card-body">
                    <table>
                        <tbody id="grocery-budget-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getFirestore, collection, doc, addDoc, deleteDoc, setDoc,
            onSnapshot, getDocs, writeBatch, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCy-TtJUv-lqhNd_aiadEoiLSveYSTatVA",
            authDomain: "fintech-dashboard-ff65f.firebaseapp.com",
            projectId: "fintech-dashboard-ff65f",
            storageBucket: "fintech-dashboard-ff65f.firebasestorage.app",
            messagingSenderId: "447875559759",
            appId: "1:447875559759:web:93cd3a61024ed62336953a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const entriesCol = collection(db, "entries");
        const settingsRef = doc(db, "settings", "budget");

        // In-memory mirrors of whatever is currently in Firestore.
        // These get rebuilt fresh every time a listener fires.
        let liveData = { Out_Of_Pocket: [], Bank_Initiated: [], Fill_Ups: [], Bank_Reconciliation: [], Grocery_Budget: [] };
        let settings = { spendableIncome: 0, bankReconStart: 2500, groceryStart: 500 };
        const expenseTotals = { Out_Of_Pocket: 0, Bank_Initiated: 0 };
        const reconBalances = { Bank_Reconciliation: { start: 0, expenses: 0 }, Grocery_Budget: { start: 0, expenses: 0 } };
        let revenueChartInstance = null;

        const updateChart = () => {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            const expenses = expenseTotals.Out_Of_Pocket + expenseTotals.Bank_Initiated;
            const spendable = parseFloat(document.getElementById('spendable-income').value) || 0;
            const remaining = Math.max(0, spendable - expenses);

            const data = {
                labels: ['Expenses', 'Remaining'],
                datasets: [{ data: [expenses, remaining], backgroundColor: ['#ef4444', '#10b981'], borderWidth: 0 }]
            };

            if (revenueChartInstance) {
                revenueChartInstance.data = data;
                revenueChartInstance.update();
            } else {
                revenueChartInstance = new Chart(ctx, { type: 'pie', data: data, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
            }
        };

        window.calculateRevenue = () => {
            const spendable = parseFloat(document.getElementById('spendable-income').value) || 0;
            const actualRevenue = spendable - (expenseTotals.Out_Of_Pocket + expenseTotals.Bank_Initiated);
            const display = document.getElementById('actual-revenue');
            display.innerText = formatMoney(actualRevenue);
            display.style.color = (actualRevenue < 0) ? 'var(--danger-red)' : 'var(--text-main)';
            updateChart();
        };

        window.persistSpendableIncome = async () => {
            const spendable = parseFloat(document.getElementById('spendable-income').value) || 0;
            try { await setDoc(settingsRef, { spendableIncome: spendable }, { merge: true }); }
            catch (err) { console.error("Couldn't save income:", err); }
        };

        const formatMoney = (amount) => {
            const num = parseFloat(amount);
            return (isNaN(num) ? '$0.00' : (num < 0 ? '-' : '') + '$' + Math.abs(num).toFixed(2));
        };

        const getBadgeClass = (status) => {
            if (!status) return '';
            return (status.toString().toUpperCase() === 'PAID') ? 'badge-paid' : 'badge-unpaid';
        };

        window.openInlineForm = (tbodyId) => {
            document.getElementById(`add-btn-${tbodyId}`).style.display = 'none';
            document.getElementById(`inline-form-${tbodyId}`).style.display = 'table-row';
            document.getElementById(`input-name-${tbodyId}`).focus();
        };

        // Delete by the document's real Firestore ID — no more matching on name text.
        window.deleteItem = async (id) => {
            try { await deleteDoc(doc(db, "entries", id)); }
            catch (err) { alert("Couldn't delete — check your connection."); console.error(err); }
        };

        window.saveInlineExpense = async (tbodyId, tabName, isFillUp = false) => {
            const nameInput = document.getElementById(`input-name-${tbodyId}`);
            const statusInput = document.getElementById(`input-status-${tbodyId}`);
            const amountInput = document.getElementById(`input-amount-${tbodyId}`);

            const name = nameInput.value.trim();
            const status = statusInput.value;
            const amount = parseFloat(amountInput?.value || 0);

            if (!name) { alert("Please enter a name."); return; }

            try {
                await addDoc(entriesCol, {
                    category: tabName,
                    name,
                    amount: isFillUp ? 0 : amount,
                    status,
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                alert("Couldn't save — check your connection.");
                console.error(err);
                return;
            }

            if (amountInput) amountInput.value = '';
            nameInput.value = '';
            statusInput.value = 'PAID';
            document.getElementById(`inline-form-${tbodyId}`).style.display = 'none';
            document.getElementById(`add-btn-${tbodyId}`).style.display = 'table-row';
            // No manual row insertion needed — the onSnapshot listener below
            // will see this new document and re-render automatically.
        };

        window.recalcRecon = (tbodyId, tabName) => {
            const startVal = parseFloat(document.getElementById(`start-input-${tbodyId}`).value) || 0;
            reconBalances[tabName].start = startVal;
            const currentBalance = startVal - reconBalances[tabName].expenses;

            const balanceAmountCell = document.getElementById(`balance-amount-${tbodyId}`);
            const balanceStatusCell = document.getElementById(`balance-status-${tbodyId}`);
            balanceAmountCell.innerText = formatMoney(currentBalance);
            balanceAmountCell.className = currentBalance < 0 ? 'amount-red' : (currentBalance === 0 ? 'amount-green' : '');
            balanceStatusCell.innerText = currentBalance === 0 ? 'RECONCILED' : 'NOT RECONCILED';
            balanceStatusCell.style.color = currentBalance === 0 ? 'var(--success-green)' : 'var(--danger-red)';
        };

        window.persistStartingBalance = async (tbodyId, tabName) => {
            const startVal = parseFloat(document.getElementById(`start-input-${tbodyId}`).value) || 0;
            const field = tabName === 'Bank_Reconciliation' ? 'bankReconStart' : 'groceryStart';
            try { await setDoc(settingsRef, { [field]: startVal }, { merge: true }); }
            catch (err) { console.error("Couldn't save starting balance:", err); }
        };

        window.saveReconciliation = async (tbodyId, tabName) => {
            const amountInput = document.getElementById(`input-amount-${tbodyId}`);
            const nameInput = document.getElementById(`input-name-${tbodyId}`);
            const amount = parseFloat(amountInput.value);
            const name = nameInput.value.trim();

            if (!name || isNaN(amount)) { alert("Please enter both a name and an amount."); return; }

            try {
                await addDoc(entriesCol, { category: tabName, name, amount, status: '', createdAt: serverTimestamp() });
            } catch (err) {
                alert("Couldn't save — check your connection.");
                console.error(err);
                return;
            }

            amountInput.value = ''; nameInput.value = '';
            document.getElementById(`inline-form-${tbodyId}`).style.display = 'none';
            document.getElementById(`add-btn-${tbodyId}`).style.display = 'table-row';
        };

        window.performHardReset = async () => {
            if (!confirm("⚠️ DANGER: This will delete ALL data. Are you absolutely sure?")) return;
            if (!confirm("FINAL WARNING: This cannot be undone. Click OK to wipe everything.")) return;
            try {
                const snap = await getDocs(entriesCol);
                const batch = writeBatch(db);
                snap.forEach((d) => batch.delete(d.ref));
                batch.set(settingsRef, { spendableIncome: 0, bankReconStart: 2500, groceryStart: 500 });
                await batch.commit();
                alert("Data reset successfully.");
            } catch (error) {
                alert("Failed to reset.");
                console.error(error);
            }
        };

        const renderExpenseTable = (rows, tbodyId, totalId, tabName) => {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = ''; let total = 0;
            rows.forEach(item => {
                if (!item.name) return;
                total += (item.amount || 0);
                tbody.innerHTML += `<tr><td class="amount-cell amount-red">${formatMoney(item.amount || 0)}</td><td>${item.name}</td><td class="action-cell"><span class="badge ${getBadgeClass(item.status)}">${item.status || ''}</span> <span class="delete-btn" title="Delete" onclick="deleteItem('${item.id}')">×</span></td></tr>`;
            });
            expenseTotals[tabName] = total;
            tbody.innerHTML += `<tr id="add-btn-${tbodyId}" class="add-row-btn" onclick="openInlineForm('${tbodyId}')"><td colspan="3">+ Add New</td></tr>
                <tr id="inline-form-${tbodyId}" style="display: none; background-color: #f9fafb;">
                    <td><input type="number" id="input-amount-${tbodyId}" class="inline-input" placeholder="0.00" step="0.01"></td>
                    <td><input type="text" id="input-name-${tbodyId}" class="inline-input" placeholder="Name"></td>
                    <td><div style="display: flex; gap: 0.5rem; align-items: center;"><select id="input-status-${tbodyId}" class="inline-input"><option value="PAID">PAID</option><option value="UNPAID">UNPAID</option></select><button class="save-btn" onclick="saveInlineExpense('${tbodyId}', '${tabName}')">Save</button></div></td>
                </tr>`;
            document.getElementById(totalId).innerText = formatMoney(total);
        };

        const renderFillUps = (rows) => {
            const tbody = document.getElementById('fill-ups-body');
            tbody.innerHTML = '';
            rows.forEach(item => {
                if (item.name) tbody.innerHTML += `<tr><td>${item.name}</td><td class="action-cell" style="text-align: right; justify-content: flex-end;"><span class="badge ${getBadgeClass(item.status)}">${item.status || ''}</span> <span class="delete-btn" title="Delete" onclick="deleteItem('${item.id}')">×</span></td></tr>`;
            });
            tbody.innerHTML += `<tr id="add-btn-fill-ups-body" class="add-row-btn" onclick="openInlineForm('fill-ups-body')"><td colspan="2">+ Add New</td></tr>
                <tr id="inline-form-fill-ups-body" style="display: none; background-color: #f9fafb;">
                    <td><input type="text" id="input-name-fill-ups-body" class="inline-input" placeholder="Name (e.g. Fill Up 1)"></td>
                    <td><div style="display: flex; gap: 0.5rem; align-items: center;"><select id="input-status-fill-ups-body" class="inline-input"><option value="PAID">PAID</option><option value="UNPAID">UNPAID</option></select><button class="save-btn" onclick="saveInlineExpense('fill-ups-body', 'Fill_Ups', true)">Save</button></div></td>
                </tr>`;
        };

        const renderReconciliation = (rows, tbodyId, tabName) => {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';
            const startField = tabName === 'Bank_Reconciliation' ? 'bankReconStart' : 'groceryStart';
            const savedStart = settings[startField] ?? (tabName === 'Bank_Reconciliation' ? 2500 : 500);

            tbody.innerHTML += `<tr style="background: #f9fafb;"><td style="display: flex; align-items: baseline; font-weight: bold;"><span style="color: var(--text-muted); margin-right: 2px;">$</span><input type="number" id="start-input-${tbodyId}" class="ghost-input" style="font-size: 1rem; padding: 0;" value="${savedStart}" step="0.01" oninput="recalcRecon('${tbodyId}', '${tabName}')" onchange="persistStartingBalance('${tbodyId}', '${tabName}')"></td><td style="text-align: right; color: var(--text-muted);">Starting Balance</td></tr>`;

            let expenseTotal = 0;
            rows.forEach(item => {
                if (!item.name) return;
                const amount = parseFloat(item.amount) || 0;
                expenseTotal += amount;
                tbody.innerHTML += `<tr><td>${item.name}</td><td class="action-cell amount-red" style="text-align: right; justify-content: flex-end;">-${formatMoney(amount)} <span class="delete-btn" title="Delete" onclick="deleteItem('${item.id}')">×</span></td></tr>`;
            });

            reconBalances[tabName] = { start: parseFloat(savedStart), expenses: expenseTotal };
            const currentBalance = parseFloat(savedStart) - expenseTotal;

            tbody.innerHTML += `<tr id="total-row-${tbodyId}" class="total-row"><td id="balance-amount-${tbodyId}" class="${currentBalance < 0 ? 'amount-red' : (currentBalance === 0 ? 'amount-green' : '')}">${formatMoney(currentBalance)}</td><td id="balance-status-${tbodyId}" style="text-align: right; font-size: 0.8rem; color: ${currentBalance === 0 ? 'var(--success-green)' : 'var(--danger-red)'};">${currentBalance === 0 ? 'RECONCILED' : 'NOT RECONCILED'}</td></tr>`;

            tbody.innerHTML += `<tr id="add-btn-${tbodyId}" class="add-row-btn" onclick="openInlineForm('${tbodyId}')"><td colspan="2">+ Add New</td></tr>
                <tr id="inline-form-${tbodyId}" style="display: none; background-color: #f9fafb;">
                    <td><input type="number" id="input-amount-${tbodyId}" class="inline-input" placeholder="0.00" step="0.01"></td>
                    <td><div style="display: flex; gap: 0.5rem; align-items: center;"><input type="text" id="input-name-${tbodyId}" class="inline-input" placeholder="Name"><button class="save-btn" onclick="saveReconciliation('${tbodyId}', '${tabName}')">Save</button></div></td>
                </tr>`;
        };

        function renderAll() {
            renderExpenseTable(liveData.Out_Of_Pocket, 'out-of-pocket-body', 'out-of-pocket-total', 'Out_Of_Pocket');
            renderExpenseTable(liveData.Bank_Initiated, 'bank-initiated-body', 'bank-initiated-total', 'Bank_Initiated');
            renderFillUps(liveData.Fill_Ups);
            renderReconciliation(liveData.Bank_Reconciliation, 'bank-recon-body', 'Bank_Reconciliation');
            renderReconciliation(liveData.Grocery_Budget, 'grocery-budget-body', 'Grocery_Budget');
            window.calculateRevenue();
        }

        // These two listeners replace loadDashboard() entirely — there's no
        // one-time fetch anymore. Anything that changes in Firestore re-runs
        // renderAll() automatically, from anywhere: this tab, your phone, etc.
        onSnapshot(entriesCol, (snap) => {
            for (const key in liveData) liveData[key] = [];
            snap.forEach((docSnap) => {
                const row = { id: docSnap.id, ...docSnap.data() };
                if (liveData[row.category]) liveData[row.category].push(row);
            });
            renderAll();
        }, (err) => console.error("Entries listener error:", err));

        onSnapshot(settingsRef, (snap) => {
            if (snap.exists()) settings = { ...settings, ...snap.data() };
            document.getElementById('spendable-income').value = settings.spendableIncome;
            renderAll();
        }, (err) => console.error("Settings listener error:", err));
    </script>
</body>
</html>
